<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">

    
</head>

<body>
    <img class="Frame" src="image/Frame.png" alt="icon">
        
    <div class="up" >
        <span class="Login" >
            Login
        </span>

        <span class="I" >
            I
        </span>

        <span class="Register" >
            Register
        </span>
    </div>

    <p id="reg" >
        Enter your email and password to register.
    </p>

    <form action="#">
        <p>
            <label for="un" class="lb">
                Username
            </label>
            <input id="un" placeholder="Username" type="text">
        </p>

        <p>
            <label for="el" class="lb">
                Email
            </label>
            <input id="el" placeholder="Enter your email address" type="email">
        </p>

        <p>
            <label for="pd" class="lb">
                Password
            </label>
            <input id="pd" placeholder="Password" type="password">
        </p>

        <p>
            <label for="cd" class="lb">
                Confirm Password
            </label>
            <input id="cd" placeholder="Confirm Password" type="password">
        </p>

        <button class="buttonreg">
            Register
        </button>
    </form>

    <span class="line">
    </span>

    <span class="or-text" >
        Or register with
    </span>

    <span class="line">
    </span>


    <div>
        <p class="social-box" >

            <button>
                <img src="image/google.png" alt="" width="20" style="margin-right: 20px;">Continue with Google</button>
        </p>

        <p class="social-box" >

            <button>
                <img src="image/facebook.png" alt="" width="20" style="margin-right: 20px;">Continue with
                Facebook</button>
        </p>
    </div>

    <p class="bottom-line" ></p>

    
</body>

</html>
