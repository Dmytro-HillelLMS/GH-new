<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            text-align: center;

        }

        input {
            border: 1px solid #EAEAEA;
            width: 300px;
            height: 40px;
            opacity: 1;
            border-radius: 5px;


        }

        .lb {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
        }
    </style>
</head>

<body>
    <img src="image/Frame.png" alt="icon"
        style=" width: 18px; height: 18px; display: flex; margin-left: auto; margin-top: 13px; margin-right: 13px;  ">


    <div style="margin:40px 0;">
        <span style="font-weight: 500;font-size: 20px;line-height: 16px; color: #3D3D3D;">
            Login
        </span>

        <span style="font-weight: 250; font-size: 18px; line-height: 16px; color: #3D3D3D; margin:0 8px ;">
            I
        </span>

        <span style="color: #46A358;font-weight: 500;font-size: 20px; line-height: 16px;">
            Register
        </span>
    </div>

    <p style="font-weight: 400; font-size: 13px; line-height: 16px; color: #3D3D3D ;">
        Enter your email and password to register.
    </p>

    <form action="#">
        <p>
            <label for="un" class="lb">
                Username
            </label>
            <input id="un" placeholder="Username" type="text">
        </p>

        <p>
            <label for="el" class="lb">
                Email
            </label>
            <input id="el" placeholder="Enter your email address" type="email">
        </p>

        <p>
            <label for="pd" class="lb">
                Password
            </label>
            <input id="pd" placeholder="Password" type="password">
        </p>

        <p>
            <label for="cd" class="lb">
                Confirm Password
            </label>
            <input id="cd" placeholder="Confirm Password" type="password">
        </p>

        <button
            style="background: #46A358; color: #FFFFFF; border: none; width: 300px; height: 45px; border-radius: 5px;">
            Register
        </button>

    </form>

    <span
        style="display: inline-block; width: 97px; height: 1px; background: #EAEAEA;vertical-align: middle; margin:45px 0;">
    </span>

    <span style="font-weight: 400; font-size: 13px; line-height: 16px; color: #3D3D3D;">
        Or register with
    </span>

    <span
        style="display: inline-block; width: 97px; height: 1px; background: #EAEAEA;vertical-align: middle; margin:45px 0;">
    </span>


    <div>
        <p style="width:300px; height:40px; border-radius:5px; border:1px solid #EAEAEA; 
        margin: auto; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom:15px">

            <button
                style="border: none; background: #FFFFFF; display: flex; align-items: center; justify-content: center; ">
                <img src="image/google.png" alt="" width="20" style="margin-right: 20px;">Continue with Google</button>
        </p>

        <p style="width:300px; height:40px; border-radius:5px; border:1px solid #EAEAEA; 
            margin: auto; display: flex; align-items: center; justify-content: center; gap: 10px; ">

            <button
                style="border: none; background: #FFFFFF; display: flex; align-items: center; justify-content: center; ">
                <img src="image/facebook.png" alt="" width="20" style="margin-right: 20px;">Continue with
                Facebook</button>
        </p>
    </div>

    <p style="width: 100%; height: 10px; top: 646px; background: #46A358; position: fixed; bottom: 0; left: 0; "></p>

    
</body>

</html>
